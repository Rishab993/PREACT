name: preact_app
description: PREACT - Police Command & Crowd Management System for Bengaluru Traffic Police
publish_to: "none"
version: 4.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # HTTP client
  dio: ^5.4.3+1

  # Supabase (DB + Realtime + Auth)
  supabase_flutter: ^2.5.6

  # Maps
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Voice input
  record: ^5.2.1

  # Voice output
  flutter_tts: ^4.0.2

  # Audio playback (for Bhashini audio bytes)
  audioplayers: ^6.0.0

  # Firebase

  # Env config
  flutter_dotenv: ^5.1.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  uuid: ^4.4.2
  http: ^1.2.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/preact_logo.png

  generate: true

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  record_linux: 1.3.1
